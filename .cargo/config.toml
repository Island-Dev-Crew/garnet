# Workspace cargo config — pins the build to a path WITHOUT spaces so that
# MinGW dlltool can invoke its sub-tools (gas) successfully on Windows.
# The workspace itself sits under "D:/Projects/New folder/Garnet (1)/...",
# whose spaces and parentheses break GNU binutils argument parsing.
#
# Override with: cargo build --target-dir <other> ...

[build]
target-dir = "C:/garnet-build/target"
