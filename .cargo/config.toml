# Workspace cargo config.
#
# Do not commit machine-specific absolute paths here. A previous Windows-local
# target dir (`C:/garnet-build/target`) breaks macOS because the `C:` segment is
# treated as a path separator when Cargo builds dynamic-library search paths.
#
# If a Windows MinGW setup needs a no-spaces target directory, pass it locally:
#
#   cargo build --target-dir C:/garnet-build/target
#
# MSVC and Unix-like builds should use the repo-local target directory below.

[build]
target-dir = "target"
