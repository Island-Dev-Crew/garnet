[package]
name = "{{name}}"
version = "0.1.0"
edition = "garnet-0.3"
description = "A Garnet multi-actor agent orchestrator (Researcher / Synthesizer / Reviewer)"

[build]
mode = "managed"

[caps]
# Starter project is pure so first run is frictionless.
# Add time/fs/net as the project grows into persisted traces or services.
allowed = []

[[bin]]
name = "{{name}}"
path = "src/main.garnet"
